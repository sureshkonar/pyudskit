site_name: pyudskit
site_description: Talk to your ECU in plain English — LLM-powered ISO 14229 UDS assistant
site_url: https://pyudskit.readthedocs.io
repo_url: https://github.com/sureshkonar/pyudskit
repo_name: sureshkonar/pyudskit
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.png
  favicon: assets/favicon.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Concepts:
    - What is UDS?: concepts/what-is-uds.md
    - Diagnostic Sessions: concepts/sessions.md
    - UDS Services: concepts/services.md
    - Negative Response Codes: concepts/negative-response-codes.md
    - DTCs: concepts/dtc.md
    - Security Access: concepts/security-access.md
    - Data Identifiers: concepts/data-identifiers.md
    - Timing Parameters: concepts/timing.md
  - Beginner Guide:
    - Your First Request: beginner-guide/your-first-request.md
    - Reading DTCs: beginner-guide/reading-dtcs.md
    - Decoding Responses: beginner-guide/decoding-responses.md
    - Common Questions: beginner-guide/common-questions.md
  - Services:
    - Session Management: services/session-management.md
    - Data Transmission: services/data-transmission.md
    - DTC Management: services/dtc-management.md
    - I/O Control: services/io-control.md
    - Routine Control: services/routine-control.md
    - Upload & Download: services/upload-download.md
  - Flows:
    - Programming Flow: flows/programming-flow.md
    - Security Access Flow: flows/security-access-flow.md
    - DTC Reading Flow: flows/dtc-reading-flow.md
    - I/O Control Flow: flows/io-control-flow.md
    - End-of-Line Flow: flows/eol-flow.md
    - OTA Update Flow: flows/ota-update-flow.md
  - API Reference:
    - UDS Class: api-reference/uds-class.md
    - AI Client: api-reference/ai-client.md
    - Services: api-reference/services.md
    - Transport: api-reference/transport.md
    - Async: api-reference/async.md
    - CLI: api-reference/cli.md
    - UDSMessage: api-reference/uds-message.md
    - UDSSession: api-reference/uds-session.md
    - Utils: api-reference/utils.md
  - Examples:
    - Beginner Examples: examples/beginner-examples.md
    - Advanced Examples: examples/advanced-examples.md
    - Real-World Scenarios: examples/real-world-scenarios.md
  - Reference Tables:
    - All Services: reference/service-table.md
    - NRC Table: reference/nrc-table.md
    - DID Table: reference/did-table.md
    - DTC Status Bits: reference/dtc-status-bits.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
